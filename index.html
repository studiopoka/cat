<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prompt Library</title>
<style>
  :root {
    --ink: #1f2937;
    --muted: #6b7280;
    --card: rgba(255,255,255,0.88);
    --shadow: 0 18px 45px rgba(31,41,55,0.10);
    --focus: rgba(59,130,246,0.22);
    --ride-path: path('M -240 760 C 140 230 1040 110 1680 760');
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 10% 10%, rgba(255, 0, 122, 0.18), transparent 28%),
      radial-gradient(circle at 85% 15%, rgba(255, 184, 0, 0.20), transparent 30%),
      radial-gradient(circle at 15% 85%, rgba(0, 200, 255, 0.20), transparent 32%),
      radial-gradient(circle at 85% 80%, rgba(126, 87, 255, 0.20), transparent 30%),
      linear-gradient(135deg, #fff6fb 0%, #fffbe8 25%, #f4fff3 48%, #effcff 68%, #f5efff 100%);
  }
  .wrap { width: min(1120px, calc(100% - 32px)); margin: 0 auto; padding: 38px 0 56px; position: relative; z-index: 1; }
  .hero {
    border-radius: 30px;
    padding: 30px;
    background: linear-gradient(135deg, rgba(255,255,255,.9), rgba(255,255,255,.62));
    box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,.8);
    backdrop-filter: blur(16px);
  }
  h1 { margin: 0 0 8px; font-size: clamp(32px, 5vw, 56px); letter-spacing: -0.06em; line-height: .95; }
  .rainbow {
    background: linear-gradient(90deg, #ef4444, #f97316, #eab308, #22c55e, #06b6d4, #3b82f6, #8b5cf6);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .sub { margin: 0; color: var(--muted); font-size: 16px; }
  .controls { display: grid; grid-template-columns: 1.25fr .9fr auto; gap: 12px; margin-top: 24px; align-items: stretch; }
  .field { position: relative; border-radius: 18px; background: rgba(255,255,255,.85); border: 1px solid rgba(255,255,255,.85); box-shadow: inset 0 1px 0 rgba(255,255,255,.65), 0 8px 18px rgba(31,41,55,.05); overflow: hidden; }
  .field:focus-within { border-color: rgba(59,130,246,.28); box-shadow: 0 0 0 5px var(--focus), inset 0 1px 0 rgba(255,255,255,.75); }
  input, select, button { font: inherit; }
  input, select { width: 100%; border: 0; outline: none; background: transparent; color: var(--ink); padding: 15px 18px; }
  .search-field::before { content: "🔎"; position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: .65; pointer-events: none; }
  .search-field input { padding-left: 42px; }
  .select-field::after { content: "▾"; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #6b7280; pointer-events: none; font-size: 15px; }
  select { appearance: none; -webkit-appearance: none; padding-right: 42px; cursor: pointer; }
  button { cursor: pointer; border: 0; border-radius: 18px; padding: 15px 18px; font-weight: 800; white-space: nowrap; color: white; background: linear-gradient(90deg, #ef4444, #f97316, #eab308, #22c55e, #06b6d4, #3b82f6, #8b5cf6); box-shadow: 0 12px 24px rgba(99,102,241,.20); }
  .meta { margin: 18px 4px 10px; color: var(--muted); font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 16px; margin-top: 14px; }
  .card { background: var(--card); border: 1px solid rgba(255,255,255,.82); border-radius: 24px; padding: 18px; box-shadow: 0 12px 28px rgba(31,41,55,.08); backdrop-filter: blur(12px); position: relative; overflow: hidden; }
  .card::before { content: ""; position: absolute; inset: 0 0 auto 0; height: 6px; background: var(--accent, linear-gradient(90deg, #ef4444, #8b5cf6)); }
  .cat { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; margin-top: 4px; color: var(--accent-color, #8b5cf6); background: var(--accent-bg, #f5f3ff); padding: 6px 10px; border-radius: 999px; }
  h2 { font-size: 18px; margin: 12px 0 10px; letter-spacing: -0.02em; }
  .prompt { white-space: pre-wrap; line-height: 1.5; font-size: 14px; color: #374151; }
  .copy { margin-top: 14px; width: 100%; padding: 11px 14px; border-radius: 14px; font-size: 14px; background: var(--accent-color, #8b5cf6); box-shadow: 0 10px 20px color-mix(in srgb, var(--accent-color, #8b5cf6) 22%, transparent); }
  .empty { display: none; margin-top: 18px; padding: 24px; border-radius: 24px; background: rgba(255,255,255,.82); color: var(--muted); text-align: center; }

  /* Smooth rainbow ride overlay */
  .rainbow-motion { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 9999; opacity: 0; }
  .rainbow-svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
  .band {
    fill: none;
    stroke-linecap: round;
    filter: drop-shadow(0 0 10px rgba(255,255,255,.65));
    stroke-dasharray: 2500;
    stroke-dashoffset: 2500;
    opacity: 0;
  }
  .band-red { stroke: #ff5c69; stroke-width: 16; transform: translateY(-40px); }
  .band-orange { stroke: #ff9847; stroke-width: 16; transform: translateY(-16px); }
  .band-yellow { stroke: #ffd84a; stroke-width: 16; transform: translateY(8px); }
  .band-green { stroke: #50d97a; stroke-width: 16; transform: translateY(32px); }
  .band-blue { stroke: #55c9ff; stroke-width: 16; transform: translateY(56px); }
  .band-violet { stroke: #8f6cff; stroke-width: 16; transform: translateY(80px); }
  .band-highlight { stroke: rgba(255,255,255,.45); stroke-width: 5; transform: translateY(-2px); filter: drop-shadow(0 0 12px rgba(255,255,255,.9)); }

  .rider {
    position: absolute;
    left: 0; top: 0;
    opacity: 0;
    offset-path: path('M -240 760 C 140 230 1040 110 1680 760');
    offset-anchor: center center;
    offset-rotate: auto 0deg;
    will-change: offset-distance, transform, opacity;
    filter: drop-shadow(0 12px 20px rgba(0,0,0,.10)) drop-shadow(0 0 12px rgba(255,255,255,.75));
  }
  .cat-rider { width: clamp(150px, 14.5vw, 220px); }
  .meow-bubble {
    position: absolute; left: 0; top: 0;
    offset-path: path('M -240 760 C 140 230 1040 110 1680 760');
    offset-anchor: center center;
    offset-rotate: 0deg;
    opacity: 0;
    will-change: offset-distance, transform, opacity;
  }
  .meow-bubble span {
    display: inline-block;
    padding: 9px 15px 10px;
    border-radius: 999px;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: #7c3aed;
    background: linear-gradient(135deg, rgba(255,255,255,.98), rgba(255,245,255,.94));
    border: 1px solid rgba(255,255,255,.9);
    box-shadow: 0 10px 24px rgba(124,58,237,.13), inset 0 1px 0 rgba(255,255,255,.95);
    filter: drop-shadow(0 0 10px rgba(255,255,255,.9));
  }
  .meow-bubble span::after {
    content: "";
    position: absolute;
    left: 22px; bottom: -6px;
    width: 13px; height: 13px;
    background: rgba(255,255,255,.96);
    transform: rotate(45deg);
    border-radius: 3px;
  }
  .toy-rider { width: clamp(82px, 7.8vw, 124px); }
  .cat-bob, .toy-bob { transform-origin: center center; }
  .cat-rider svg, .toy-rider svg { width: 100%; height: auto; display: block; overflow: visible; }
  .tail-swish { transform-origin: 20% 60%; }
  .toy-spin { transform-origin: 50% 50%; }

  .sparkles { position: absolute; inset: 0; }
  .sparkle { position: absolute; width: var(--size); height: var(--size); opacity: 0; transform: translate(-50%, -50%) scale(.3) rotate(0deg); }
  .sparkle::before, .sparkle::after, .sparkle i::before, .sparkle i::after {
    content: "";
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,.96);
    border-radius: 999px;
    box-shadow: 0 0 12px rgba(255,255,255,.95), 0 0 18px rgba(255,231,160,.65);
  }
  .sparkle::before { width: 18%; height: 100%; }
  .sparkle::after { width: 100%; height: 18%; }
  .sparkle i::before { width: 14%; height: 72%; transform: translate(-50%, -50%) rotate(45deg); }
  .sparkle i::after { width: 72%; height: 14%; transform: translate(-50%, -50%) rotate(45deg); }

  .rainbow-motion.active { opacity: 1; }
  .rainbow-motion.active .band { animation: drawBand 3.15s cubic-bezier(.2,.8,.2,1) forwards; }
  .rainbow-motion.active .band-orange { animation-delay: .03s; }
  .rainbow-motion.active .band-yellow { animation-delay: .06s; }
  .rainbow-motion.active .band-green { animation-delay: .09s; }
  .rainbow-motion.active .band-blue { animation-delay: .12s; }
  .rainbow-motion.active .band-violet { animation-delay: .15s; }
  .rainbow-motion.active .band-highlight { animation-delay: .18s; }
  .rainbow-motion.active .cat-rider { animation: rideCat 3.25s cubic-bezier(.20,.78,.24,1) forwards; }
  .rainbow-motion.active .toy-rider { animation: rideToy 3.25s cubic-bezier(.20,.78,.24,1) forwards .18s; }
  .rainbow-motion.active .meow-bubble { animation: rideBubble 3.25s cubic-bezier(.20,.78,.24,1) forwards .04s; }
  .rainbow-motion.active .meow-bubble span { animation: bubbleFloat 620ms ease-in-out 5; }
  .rainbow-motion.active .cat-bob { animation: bob 420ms ease-in-out 8; }
  .rainbow-motion.active .toy-bob { animation: toyBob 390ms ease-in-out 8 .08s; }
  .rainbow-motion.active .tail-swish { animation: tailSwish 320ms ease-in-out 9 alternate; }
  .rainbow-motion.active .toy-spin { animation: toySpin 1.7s linear 2; }
  .rainbow-motion.active .sparkle { animation: twinkle 1.15s ease-out forwards; animation-delay: var(--delay); }

  @keyframes drawBand {
    0% { opacity: 0; stroke-dashoffset: 2500; }
    10% { opacity: 1; }
    65% { opacity: .98; stroke-dashoffset: 0; }
    100% { opacity: 0; stroke-dashoffset: 0; }
  }
  @keyframes rideCat {
    0% { opacity: 0; offset-distance: 0%; transform: translate(-20px, 16px) scale(.76); }
    8% { opacity: 1; }
    46% { opacity: 1; offset-distance: 48%; transform: translate(0, 0) scale(1); }
    88% { opacity: 1; offset-distance: 92%; transform: translate(0, 2px) scale(.9); }
    100% { opacity: 0; offset-distance: 100%; transform: translate(10px, 14px) scale(.82); }
  }
  @keyframes rideBubble {
    0% { opacity: 0; offset-distance: 0%; transform: translate(-44px, -102px) scale(.76); }
    14% { opacity: 0; }
    24% { opacity: 1; }
    52% { opacity: 1; offset-distance: 51%; transform: translate(-52px, -116px) scale(1); }
    82% { opacity: 1; offset-distance: 90%; transform: translate(-48px, -108px) scale(.92); }
    100% { opacity: 0; offset-distance: 100%; transform: translate(-40px, -96px) scale(.82); }
  }
  @keyframes rideToy {
    0% { opacity: 0; offset-distance: 0%; transform: translate(-14px, 18px) scale(.74); }
    10% { opacity: 1; }
    46% { opacity: 1; offset-distance: 43%; transform: translate(0, 0) scale(1); }
    88% { opacity: 1; offset-distance: 87%; transform: translate(0, 3px) scale(.92); }
    100% { opacity: 0; offset-distance: 95%; transform: translate(10px, 16px) scale(.82); }
  }
  @keyframes bob { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-8px) rotate(-1.5deg); } }
  @keyframes bubbleFloat { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-5px) rotate(2deg); } }
  @keyframes toyBob { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-6px) rotate(5deg); } }
  @keyframes tailSwish { 0% { transform: rotate(-9deg); } 100% { transform: rotate(10deg); } }
  @keyframes toySpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes twinkle {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(.18) rotate(0deg); }
    24% { opacity: 1; }
    72% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(38deg); }
    100% { opacity: 0; transform: translate(-50%, -62%) scale(.45) rotate(90deg); }
  }

  @media (max-width: 760px) {
    .controls { grid-template-columns: 1fr; }
    .hero { padding: 22px; }
    .band { stroke-width: 12; }
  }
</style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1><span class="rainbow">Prompt Library</span></h1>
      <p class="sub">Search, filter by category, or generate a random prompt.</p>
      <div class="controls">
        <label class="field search-field" aria-label="Search prompts">
          <input id="search" type="search" placeholder="Search prompts..." autocomplete="off" />
        </label>
        <label class="field select-field" aria-label="Filter by category">
          <select id="category">
            <option value="">All categories</option>
            <option value="Screenshot corpus audit and seed prompts">Screenshot corpus audit and seed prompts</option>
            <option value="Universal prompt builders">Universal prompt builders</option>
            <option value="Research and deep desk review">Research and deep desk review</option>
            <option value="Synthesis, insights, and sensemaking">Synthesis, insights, and sensemaking</option>
            <option value="Strategy and decisions">Strategy and decisions</option>
            <option value="Writing and editing">Writing and editing</option>
            <option value="Communications, marketing, and content">Communications, marketing, and content</option>
            <option value="Meetings, interviews, and workshops">Meetings, interviews, and workshops</option>
            <option value="Data, spreadsheets, and dashboards">Data, spreadsheets, and dashboards</option>
            <option value="Design, visuals, and creative work">Design, visuals, and creative work</option>
            <option value="Product, service, and UX">Product, service, and UX</option>
            <option value="Business development, proposals, and partnerships">Business development, proposals, and partnerships</option>
            <option value="AI agents, automation, and RAG">AI agents, automation, and RAG</option>
            <option value="Quality control and red teaming">Quality control and red teaming</option>
            <option value="Health, development, and behaviour change">Health, development, and behaviour change</option>
            <option value="Personal productivity and learning">Personal productivity and learning</option>
            <option value="Prompt chains">Prompt chains</option>
          </select>
        </label>
        <button id="random">🌈 Random prompt</button>
      </div>
    </section>
    <div class="meta" id="count"></div>
    <section class="grid" id="grid"></section>
    <section class="empty" id="empty">No prompts found. Try a different search or category.</section>
  </main>

  <div class="rainbow-motion" id="rainbowMotion" aria-hidden="true">
    <svg class="rainbow-svg" viewBox="0 0 1440 900" preserveAspectRatio="none">
      <path class="band band-red" d="M -240 760 C 140 230 1040 110 1680 760"/>
      <path class="band band-orange" d="M -240 760 C 140 230 1040 110 1680 760"/>
      <path class="band band-yellow" d="M -240 760 C 140 230 1040 110 1680 760"/>
      <path class="band band-green" d="M -240 760 C 140 230 1040 110 1680 760"/>
      <path class="band band-blue" d="M -240 760 C 140 230 1040 110 1680 760"/>
      <path class="band band-violet" d="M -240 760 C 140 230 1040 110 1680 760"/>
      <path class="band band-highlight" d="M -240 760 C 140 230 1040 110 1680 760"/>
    </svg>

    <span class="sparkle" style="left:16%; top:34%; --delay:0.26s; --size:14px;"><i></i></span>
    <span class="sparkle" style="left:20%; top:20%; --delay:0.36s; --size:16px;"><i></i></span>
    <span class="sparkle" style="left:26%; top:12%; --delay:0.14s; --size:13px;"><i></i></span>
    <span class="sparkle" style="left:31%; top:21%; --delay:0.46s; --size:18px;"><i></i></span>
    <span class="sparkle" style="left:37%; top:10%; --delay:0.3s; --size:12px;"><i></i></span>

    <span class="sparkle" style="left:49%; top:11%; --delay:0.65s; --size:18px;"><i></i></span>

    </div>

        <svg viewBox="0 0 140 140" aria-hidden="true">
          <circle cx="70" cy="70" r="47" fill="none" stroke="#7c3aed" stroke-width="12" stroke-linecap="round" stroke-dasharray="8 14"/>

          <circle cx="22" cy="46" r="14" fill="#48c8ff"/>

          <circle cx="104" cy="34" r="11" fill="#8b5cf6"/>

X prompt table / expanded library"}, {"id": "p076", "category": "Quality control and red teaming", "use_case": "Stress test", "prompt": "Stress-test this recommendation under constraints: low budget, low trust, weak data, political sensitivity, and implementation delays. Recommendation: [paste].", "best_for": "Implementation QA", "variables": "recommendation", "source": "DOCX prompt table / expanded library"}, {"id": "p077", "category": "Quality control and red teaming", "use_case": "Final polish", "prompt": "Review this document for clarity, structure, repetition, weak claims, jargon, and missing transitions. Provide prioritized edits. Document: [paste].", "best_for": "Document QA", "variables": "document", "source": "DOCX prompt table / expanded library"}, {"id": "p078", "category": "Health, development, and behaviour change", "use_case": "Behavioural barrier scan", "prompt": "Analyse barriers to [behaviour] across capability, opportunity, motivation, trust, norms, friction, and incentives. Then propose interventions.", "best_for": "Behaviour change", "variables": "behaviour", "source": "DOCX prompt table / expanded library"}, {"id": "p079", "category": "Health, development, and behaviour change", "use_case": "Message testing plan", "prompt": "Design a message testing plan for [audience] on [topic]. Include hypotheses, stimuli, questions, sample, success criteria, and synthesis format.", "best_for": "Health/comms research", "variables": "audience, topic", "source": "DOCX prompt table / expanded library"}, {"id": "p080", "category": "Health, development, and behaviour change", "use_case": "Frontline workflow", "prompt": "Map the frontline worker workflow for [service]. Identify decision points, burden, data capture, referral, supervision, and failure points.", "best_for": "Public systems", "variables": "service", "source": "DOCX prompt table / expanded library"}, {"id": "p081", "category": "Health, development, and behaviour change", "use_case": "Equity lens", "prompt": "Assess how [program] may affect groups differently by gender, geography, income, language, caste/ethnicity, disability, and digital access.", "best_for": "Equity review", "variables": "program", "source": "DOCX prompt table / expanded library"}, {"id": "p082", "category": "Personal productivity and learning", "use_case": "Learning plan", "prompt": "Create a 30-day learning plan for [skill] with daily practice, resources, exercises, and checkpoints.", "best_for": "Learning", "variables": "skill", "source": "DOCX prompt table / expanded library"}, {"id": "p083", "category": "Personal productivity and learning", "use_case": "Personal knowledge base", "prompt": "Turn these notes into a searchable knowledge base structure with tags, summaries, links, and action items. Notes: [paste].", "best_for": "Knowledge management", "variables": "notes", "source": "DOCX prompt table / expanded library"}, {"id": "p084", "category": "Personal productivity and learning", "use_case": "Weekly review", "prompt": "Run a weekly review from these notes. Identify wins, stuck points, decisions, follow-ups, and priorities for next week. Notes: [paste].", "best_for": "Planning", "variables": "notes", "source": "DOCX prompt table / expanded library"}, {"id": "p085", "category": "Prompt chains", "use_case": "Deep research chain", "prompt": "Use this as a step-by-step prompt chain:\n1. Define research questions and search strategy.\n2. Gather and summarise sources with citations.\n3. Extract claims, evidence, dates, and limitations.\n4. Compare contradictions across sources.\n5. Write synthesis with recommendations and gaps.", "best_for": "Running multi-step workflows with review checkpoints", "variables": "topic / source material / intended output", "source": "DOCX prompt-chain section"}, {"id": "p086", "category": "Prompt chains", "use_case": "Proposal chain", "prompt": "Use this as a step-by-step prompt chain:\n1. Clarify client problem and decision need.\n2. Draft storyline and workplan.\n3. Stress-test risks, assumptions, and dependencies.\n4. Write budget rationale and staffing logic.\n5. Polish for senior audience.", "best_for": "Running multi-step workflows with review checkpoints", "variables": "topic / source material / intended output", "source": "DOCX prompt-chain section"}, {"id": "p087", "category": "Prompt chains", "use_case": "Content engine chain", "prompt": "Use this as a step-by-step prompt chain:\n1. Define audience and brand voice.\n2. Generate content pillars.\n3. Build monthly calendar.\n4. Repurpose hero content into channels.\n5. Review hooks and CTAs for clarity.", "best_for": "Running multi-step workflows with review checkpoints", "variables": "topic / source material / intended output", "source": "DOCX prompt-chain section"}, {"id": "p088", "category": "Prompt chains", "use_case": "Design sprint chain", "prompt": "Use this as a step-by-step prompt chain:\n1. Frame user/problem hypothesis.\n2. Create journey and barriers.\n3. Generate opportunity areas.\n4. Prototype concepts.\n5. Create test plan and synthesis grid.", "best_for": "Running multi-step workflows with review checkpoints", "variables": "topic / source material / intended output", "source": "DOCX prompt-chain section"}, {"id": "p089", "category": "Prompt chains", "use_case": "Data-to-insight chain", "prompt": "Use this as a step-by-step prompt chain:\n1. Audit dataset and definitions.\n2. Build analysis plan.\n3. Generate tables/charts.\n4. Interpret findings and anomalies.\n5. Write executive summary and next analysis.", "best_for": "Running multi-step workflows with review checkpoints", "variables": "topic / source material / intended output", "source": "DOCX prompt-chain section"}];
const CATEGORY_STYLES = {"Screenshot corpus audit and seed prompts": {"color": "#ef4444", "bg": "#fff1f2"}, "Universal prompt builders": {"color": "#f97316", "bg": "#fff7ed"}, "Research and deep desk review": {"color": "#eab308", "bg": "#fefce8"}, "Synthesis, insights, and sensemaking": {"color": "#22c55e", "bg": "#f0fdf4"}, "Strategy and decisions": {"color": "#06b6d4", "bg": "#ecfeff"}, "Writing and editing": {"color": "#3b82f6", "bg": "#eff6ff"}, "Communications, marketing, and content": {"color": "#8b5cf6", "bg": "#f5f3ff"}, "Meetings, interviews, and workshops": {"color": "#d946ef", "bg": "#fdf4ff"}, "Data, spreadsheets, and dashboards": {"color": "#ef4444", "bg": "#fff1f2"}, "Design, visuals, and creative work": {"color": "#f97316", "bg": "#fff7ed"}, "Product, service, and UX": {"color": "#eab308", "bg": "#fefce8"}, "Business development, proposals, and partnerships": {"color": "#22c55e", "bg": "#f0fdf4"}, "AI agents, automation, and RAG": {"color": "#06b6d4", "bg": "#ecfeff"}, "Quality control and red teaming": {"color": "#3b82f6", "bg": "#eff6ff"}, "Health, development, and behaviour change": {"color": "#8b5cf6", "bg": "#f5f3ff"}, "Personal productivity and learning": {"color": "#d946ef", "bg": "#fdf4ff"}, "Prompt chains": {"color": "#ef4444", "bg": "#fff1f2"}};
const grid = document.getElementById('grid');
const search = document.getElementById('search');
const category = document.getElementById('category');
const count = document.getElementById('count');
const empty = document.getElementById('empty');
const randomBtn = document.getElementById('random');
const rainbowMotion = document.getElementById('rainbowMotion');
let rideTimer = null;

function normalise(s) { return (s || '').toLowerCase(); }
function escapeHTML(str) { return String(str || '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
function filtered() {
  const q = normalise(search.value.trim());
  const cat = category.value;
  return PROMPTS.filter(p => {
    const haystack = normalise([p.category, p.use_case, p.prompt, p.best_for, p.variables].join(' '));
    return (!cat || p.category === cat) && (!q || haystack.includes(q));
  });
}
async function copyPrompt(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    const old = btn.textContent;
    btn.textContent = 'Copied';
    setTimeout(() => btn.textContent = old, 900);
  } catch (e) {
    alert('Copy failed. Select the prompt text and copy manually.');
  }
}
function triggerRainbowRide() {
  clearTimeout(rideTimer);
  rainbowMotion.classList.remove('active');
  void rainbowMotion.offsetWidth;
  rainbowMotion.classList.add('active');
  rideTimer = setTimeout(() => rainbowMotion.classList.remove('active'), 3450);
}
function render(list = filtered()) {
  grid.innerHTML = list.map(p => {
    const style = CATEGORY_STYLES[p.category] || { color: '#8b5cf6', bg: '#f5f3ff' };
    return `
      <article class="card" style="--accent-color:${style.color};--accent-bg:${style.bg};--accent:linear-gradient(90deg, ${style.color}, color-mix(in srgb, ${style.color} 45%, white));">
        <div class="cat">${escapeHTML(p.category)}</div>
        <h2>${escapeHTML(p.use_case || 'Prompt')}</h2>
        <div class="prompt">${escapeHTML(p.prompt)}</div>
        <button class="copy" data-id="${escapeHTML(p.id)}">Copy prompt</button>
      </article>`;
  }).join('');
  count.textContent = `${list.length} prompt${list.length === 1 ? '' : 's'} shown`;
  empty.style.display = list.length ? 'none' : 'block';
  document.querySelectorAll('.copy').forEach(btn => btn.addEventListener('click', () => {
    const p = PROMPTS.find(x => x.id === btn.dataset.id);
    copyPrompt(p ? p.prompt : '', btn);
  }));
}
search.addEventListener('input', () => render());
search.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    render();
    triggerRainbowRide();
  }
});
category.addEventListener('change', () => render());
randomBtn.addEventListener('click', () => {
  triggerRainbowRide();
  const list = filtered();
  const pool = list.length ? list : PROMPTS;
  const p = pool[Math.floor(Math.random() * pool.length)];
  render([p]);
  window.scrollTo({ top: document.querySelector('.meta').offsetTop - 12, behavior: 'smooth' });
});
render();
</script>
</body>
</html>
